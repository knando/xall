<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de Login</title>
    <style type="text/css">
        body, html {
            margin: 0;
            padding: 0;
        }
        .div-body {
            background-color: #696969;
            min-height: 100vh;
            padding: 20px;
            font-family: sans-serif;
            text-align: center;
        }
        .div-container {
            border-radius: 15px;
            padding: 20px;
            background-color: #add8e6;
            display: inline-block;
            border: 1px solid #ccc;
            width: 100%;
            max-width: 350px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }
        .input {
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        #butao-entrar {
            border-radius: 20px;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            background-color: #555;
            color: white;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }
        #butao-entrar:hover {
            background-color: #333;
        }
        .div-cont-inputs {
            text-align: left;
        }
        legend {
            margin-bottom: 5px;
            font-weight: bold;
        }
        label {
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="div-body">
    <h1 id="titulo-login" style="color: white;">Bem-vindo</h1>
    
    <form class="div-container" id="meuFormulario">
        <fieldset style="border: none; padding: 0;">
            <div class="div-cont-inputs">
                <legend>Usuário:</legend>
                <input type="text" id="usuario" placeholder="ex: usuario123" class="input">
                
                <legend>Senha:</legend>
                <input type="password" id="senha" placeholder="senha no min 8 caracteres" class="input">
                
                <label>
                    <input type="checkbox" id="check-senha" onclick="toggleSenha()"> 
                    <span>Mostrar senha</span>
                </label>
            </div>
            
            <!-- O botão chama a função de validar -->
            <button type="button" id="butao-entrar" onclick="validarELogar()">Entrar</button>
        </fieldset>
    </form>
</div>

<script>
    function validarELogar() {
        // Pega os valores dos campos
        var usuarioValue = document.getElementById("usuario").value;
        var senhaValue = document.getElementById("senha").value;

        // Validação: campos não podem estar vazios e senha deve ter 8+ caracteres
        if (usuarioValue.trim() === "" || senhaValue.trim() === "") {
            alert("Erro: Preencha todos os campos antes de entrar!");
        } 
        else if (senhaValue.length < 8) {
            alert("Erro: A senha deve ter no mínimo 8 caracteres!");
        } 
        else {
            // Se passar na validação, ele vai para o seu outro arquivo
            // Certifique-se de que o uft1.html está na mesma pasta!
            window.location.href = "uft1.html";
        }
    }

    function toggleSenha() {
        var inputSenha = document.getElementById("senha");
        if (inputSenha.type === "password") {
            inputSenha.type = "text";
        } else {
            inputSenha.type = "password";
        }
    }
</script>

</body>
</html>
