<style>
    body, html {
	<html lang="pt-br">
        margin: 0;
        padding: 0;
        font-family: sans-serif;
    }
    /* Fundo cinza escuro da página */
    .div-body {
        background-color: #696969;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
    }
    /* Container Azul Claro */
    .div-container {
        background-color: #add8e6;
        padding: 30px;
        border-radius: 15px;
        border: 1px solid #999;
        width: 100%;
        max-width: 350px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        text-align: left;
    }

    h2 {
        margin: 0 0 20px 0;
        font-size: 20px;
        color: #333;
    }

    /* Grid com 3 colunas para os quadradinhos */
    .grid-eventos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px 10px; /* Espaço entre as linhas e colunas */
        text-align: center;
    }

    .evento-item {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Estilo dos quadradinhos */
    .box {
        width: 65px;
        height: 65px;
        border-radius: 12px;
        border: 1.5px solid #444;
        margin-bottom: 8px;
    }

    .evento-item span {
        font-size: 12px;
        font-weight: bold;
        color: #333;
    }

    /* Cores fiéis à imagem */
    .roxo { background-color: #d1b3ff; }
    .verde { background-color: #c1f0c1; }
    .azul-escuro { background-color: #1a73e8; }
    .azul-medio { background-color: #3399ff; }
    .amarelo { background-color: #fff2cc; }
    .azul-claro { background-color: #c9daf8; }

</style>

<div class="div-body">
    <div class="div-container">
        <h2>Eventos</h2>

        <div class="grid-eventos">
            <div class="evento-item">
                <div class="box roxo"></div>
                <span>Dia da vac</span>
            </div>
            <div class="evento-item">
                <div class="box verde"></div>
                <span>Feriado M</span>
            </div>
            <div class="evento-item">
                <div class="box azul-escuro"></div>
                <span>Dia dos P</span>
            </div>
            <div class="evento-item">
                <div class="box azul-medio"></div>
                <span>Meu amigo</span>
            </div>
            <div class="evento-item">
                <div class="box amarelo"></div>
                <span>Páscoa</span>
            </div>
            <div class="evento-item">
                <div class="box azul-claro"></div>
                <span>Aniversári</span>
            </div>
        </div>
    </div>
</div>
